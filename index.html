<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker Audit Log - Fast Entry</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --success-light: #ecfdf5;
            --success-dark: #047857;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            padding: 30px 15px;
            min-height: 100vh;
            margin: 0;
            line-height: 1.5;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .audit-box {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 5px;
            letter-spacing: -0.025em;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .product-section {
            margin-bottom: 12px;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: #f8fafc;
            transition: all 0.2s ease;
        }

        .product-section:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
            background: #fff;
        }

        .product-line {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #0f172a;
        }

        .input-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        input[type="date"], input[type="number"] {
            background: #fff;
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 10px 12px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        input[type="date"] {
            min-width: 150px;
        }

        input[type="number"] {
            width: 100px;
            font-weight: 600;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .enter-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            align-self: flex-end;
            transition: background-color 0.2s;
        }

        .enter-btn:hover {
            background: var(--primary-hover);
        }

        .status {
            margin-top: 10px;
            padding: 8px 12px;
            font-size: 0.85rem;
            border-radius: 6px;
            display: none;
            font-weight: 500;
        }

        .status.sent {
            background: var(--success-light);
            color: var(--success-dark);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .grand-total {
            font-size: 1.4rem;
            margin: 30px 0 20px 0;
            background: #0f172a;
            color: #fff;
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            font-weight: 700;
            letter-spacing: 0.025em;
        }

        /* HISTORY SECTION - ENHANCED */
        #historySection {
            margin-bottom: 25px;
            padding: 20px;
            background: #f1f5f9;
            border-radius: 12px;
            border: 2px solid var(--border);
            position: relative;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .history-title {
            font-weight: 700;
            font-size: 1rem;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .history-controls {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn {
            background: #fff;
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            transition: all 0.2s;
            text-decoration: none;
        }

        .btn:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            border-color: var(--primary-hover);
        }

        .btn-success {
            background: var(--success);
            color: white;
            border-color: var(--success);
        }

        .btn-success:hover {
            background: var(--success-dark);
        }

        #historyList {
            max-height: 300px;
            overflow-y: auto;
            font-size: 0.88rem;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: white;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            min-width: 400px;
        }

        .history-table th {
            background: var(--primary);
            color: white;
            padding: 12px 8px;
            text-align: left;
            font-weight: 600;
            font-size: 0.85rem;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .history-table td {
            padding: 10px 8px;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: top;
        }

        .history-table tr:hover {
            background: #f8fafc;
        }

        .record-count {
            background: var(--success-light);
            color: var(--success-dark);
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
        }

        .error {
            text-align: center;
            padding: 20px;
            color: var(--danger);
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        /* SUMMARY STYLES */
        .summary-section {
            margin-top: 25px;
            padding: 20px;
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 12px;
            max-height: 400px;
            overflow-y: auto;
        }

        .summary-title {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 15px;
        }

        .summary-product {
            margin-bottom: 12px;
            padding: 12px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .product-header {
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 8px;
            margin: 2px 0;
            background: #f8fafc;
            border-radius: 4px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .product-total {
            font-weight: 700;
            color: var(--success-dark);
            background: var(--success-light);
            padding: 6px;
            border-radius: 6px;
            margin-top: 8px;
            font-size: 0.85rem;
            text-align: right;
        }

        /* ACTION BUTTONS */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 25px;
        }

        .btn-danger {
            color: var(--danger);
        }

        .btn-danger:hover {
            background: #fef2f2;
            border-color: #fecaca;
        }

        @media print {
            body { background: white; color: black; padding: 0; }
            .audit-box { box-shadow: none; padding: 0; }
            .summary-section { max-height: none; }
            .btn, .enter-btn, .input-row, .subtitle, #historySection { display: none !important; }
            #historyList { max-height: none !important; }
        }

        @media (max-width: 768px) {
            .history-table {
                font-size: 0.8rem;
            }
            .history-table th,
            .history-table td {
                padding: 8px 4px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="audit-box">
        <h1>Sticker Audit Log</h1>
        <div class="subtitle">Enter counts, press Enter or click Add to log.</div>

        <div id="historySection">
            <div class="history-header">
                <div class="history-title">📋 ALL RECORDS FROM GOOGLE SHEETS</div>
                <div class="history-controls">
                    <button class="btn btn-primary" onclick="fetchHistory()">🔄 Refresh</button>
                    <button class="btn btn-success" onclick="exportAll()">📄 Export CSV</button>
                </div>
            </div>
            <div class="record-count" id="recordCount" style="display: none;"></div>
            <div id="historyList">
                <div class="loading">Click refresh to load ALL records from Google Sheets...</div>
            </div>
        </div>

        <div id="products-container"></div>

        <div class="grand-total" id="grandTotal">
            GRAND TOTAL: 0 STICKERS
        </div>

        <div class="summary-section" id="summarySection" style="display: none;">
            <div class="summary-title">📊 Live Summary (Unsaved)</div>
            <div id="summaryList"></div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-danger" onclick="clearAll()">🗑️ Clear All</button>
            <button class="btn btn-primary" onclick="toggleSummary()">📋 Toggle Summary</button>
            <button class="btn btn-primary" onclick="copySummary()">📄 Copy Summary</button>
            <button class="btn btn-success" id="saveBtn" onclick="saveToGoogleSheets()" style="background: #10b981; color: white; border-color: #10b981;">☁️ Save to Sheets</button>
        </div>
    </div>
</div>

<script>
    const productList = [
        "1 x SEAT COVER", "1 x MINI FLASHLIGHT", "1 x FULL FACE BALACLAVA",
        "1 x FLEXIBLE CLIP PHONE HOLDER", "2 x SHOE CLEANER", "2 x FLASHLIGHT",
        "2 x MINI FLASHLIGHT", "1 x PANTY STOCKINGS", "1 x MAGIC MESH", "2 x ANTI - PULGAS", "1 x MAGIC TOWEL"
    ];

    let summaryData = {}; 
    let summaryVisible = false;
    const today = new Date().toISOString().split('T')[0];
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzMM60idR6QEYvznvh2ogYXDxSJ9552beS6rLFMNdhqRtqDh0zuOq4TwrHCJ8u5uKCFOA/exec";

    // Build Inputs
    const container = document.getElementById('products-container');
    productList.forEach((product, index) => {
        const id = index + 1;
        container.innerHTML += `
            <div class="product-section" id="productSection${id}">
                <div class="product-line">${product}</div>
                <div class="input-row">
                    <div class="input-group">
                        <label>Date</label>
                        <input type="date" id="date${id}" value="${today}">
                    </div>
                    <div class="input-group">
                        <label>Count</label>
                        <input type="number" id="count${id}" placeholder="0" min="1" 
                               onkeydown="if(event.key==='Enter') enterItem(${id})">
                    </div>
                    <button class="enter-btn" onclick="enterItem(${id})">Add</button>
                </div>
                <div class="status" id="status${id}"></div>
            </div>
        `;
    });

    // --- FETCH HISTORY - SHOWS ALL RECORDS ---
    function fetchHistory() {
        const historyList = document.getElementById('historyList');
        const recordCount = document.getElementById('recordCount');
        
        historyList.innerHTML = '<div class="loading">⌛ Loading ALL records from Google Sheets...</div>';
        recordCount.style.display = 'none';

        const fetchUrl = WEB_APP_URL + "?action=read&t=" + new Date().getTime();

        fetch(fetchUrl)
        .then(response => {
            if (!response.ok) throw new Error('Network response was not ok');
            return response.json();
        })
        .then(data => {
            if (data.status === "success") {
                if (!data.records || data.records.length === 0) {
                    historyList.innerHTML = '<div class="loading">No records found in Google Sheets.</div>';
                    return;
                }

                // SHOW ALL RECORDS - NO LIMIT!
                let html = `
                    <table class="history-table">
                        <thead>
                            <tr>
                                <th style="width: 20%;">Date</th>
                                <th style="width: 50%;">Product</th>
                                <th style="width: 20%;">Count</th>
                                <th style="width: 10%;">ID</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                
                data.records.forEach((rec, index) => {
                    let dateStr = rec.date ? rec.date.split('T')[0] : 'N/A';
                    let productName = rec.product || 'N/A';
                    let count = rec.count || 0;
                    let rowId = rec.rowId || index + 1;
                    
                    html += `
                        <tr>
                            <td style="font-weight: 500; color: var(--text-main);">${dateStr}</td>
                            <td style="font-weight: 600; color: #0f172a;">${productName}</td>
                            <td style="text-align: right; font-weight: 700; color: var(--success-dark);">${count}</td>
                            <td style="text-align: right; font-size: 0.8rem; color: var(--text-muted);">${rowId}</td>
                        </tr>
                    `;
                });
                
                html += `
                        </tbody>
                    </table>
                `;
                
                historyList.innerHTML = html;
                
                // Show record count
                recordCount.textContent = `Total Records: ${data.records.length}`;
                recordCount.style.display = 'inline-block';
                
            } else {
                throw new Error(data.message || 'Unknown error');
            }
        })
        .catch(err => {
            console.error("Fetch Error:", err);
            historyList.innerHTML = `<div class="error">⚠️ Failed to load records: ${err.message}</div>`;
        });
    }

    // Export all records as CSV
    function exportAll() {
        fetch(WEB_APP_URL + "?action=read")
        .then(response => response.json())
        .then(data => {
            if (data.status === "success" && data.records) {
                let csv = 'Date,Product,Count\n';
                data.records.forEach(rec => {
                let dateStr = rec.date ? rec.date.split('T')[0] : '';
                csv += `"${dateStr}","${rec.product || ''}",${rec.count || 0}\n`;
                });
                
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `sticker-audit-${new Date().toISOString().split('T')[0]}.csv`;
                a.click();
                window.URL.revokeObjectURL(url);
            }
        })
        .catch(() => alert('Failed to export.'));
    }

    function enterItem(id) {
        const dateInput = document.getElementById(`date${id}`).value;
        const countInput = document.getElementById(`count${id}`).value;
        const count = parseInt(countInput) || 0;
        const productName = productList[id - 1];
        const statusEl = document.getElementById(`status${id}`);

        if (!dateInput || count <= 0) return;

        if (!summaryData[`item${id}`]) { summaryData[`item${id}`] = []; }
        summaryData[`item${id}`].push({ product: productName, date: dateInput, count: count });

        const productTotal = summaryData[`item${id}`].reduce((sum, entry) => sum + entry.count, 0);
        statusEl.innerHTML = `<span>✅ Added ${count}</span> <span>| Total: ${productTotal}</span>`;
        statusEl.style.display = 'flex';
        statusEl.className = 'status sent';

        document.getElementById(`count${id}`).value = '';
        calculateGrandTotal();
        updateSummary();
        showSummary(); 
    }

    function saveToGoogleSheets() {
        if (Object.keys(summaryData).length === 0) {
            alert("⚠️ No data to save!");
            return;
        }

        const saveBtn = document.getElementById('saveBtn');
        saveBtn.innerText = "⏳ Saving...";
        saveBtn.disabled = true;

        fetch(WEB_APP_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            redirect: "follow",
            body: JSON.stringify(summaryData)
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === "success") {
                alert("✅ Successfully saved to Google Sheets!");
                clearAll();
                fetchHistory(); // Refresh to show new records
            } else {
                alert("❌ Error: " + (data.error || "Unknown error"));
            }
        })
        .catch(error => {
            alert("❌ Failed to reach the server.");
        })
        .finally(() => {
            saveBtn.innerText = "☁️ Save to Sheets";
            saveBtn.disabled = false;
        });
    }

    // --- ADDITIONAL FUNCTIONS ---
    function calculateGrandTotal() {
        let totalCount = 0;
        Object.values(summaryData).forEach(entries => {
            entries.forEach(entry => {
                totalCount += entry.count;
            });
        });
        document.getElementById('grandTotal').innerText = `GRAND TOTAL: ${totalCount} STICKERS`;
    }

    function updateSummary() {
        const summaryList = document.getElementById('summaryList');
        summaryList.innerHTML = '';
        for (const key in summaryData) {
            if (summaryData[key].length > 0) {
                const productName = summaryData[key][0].product;
                const div = document.createElement('div');
                div.className = 'summary-product';
                let productTotal = 0;
                let itemsHtml = '';
                
                summaryData[key].forEach((entry, index) => {
                    productTotal += entry.count;
                    itemsHtml += `
                        <div class="summary-item">
                            <span>${entry.date} - Count: ${entry.count}</span>
                            <button style="border:none; background:none; color:var(--danger); cursor:pointer; font-size:1rem;" onclick="deleteEntry('${key}', ${index})" title="Delete">🗑️</button>
                        </div>
                    `;
                });
                
                div.innerHTML = `
                    <div class="product-header">
                        <span>${productName}</span>
                        <span>Total: ${productTotal}</span>
                    </div>
                    ${itemsHtml}
                    <div class="product-total">Product Total: ${productTotal}</div>
                `;
                summaryList.appendChild(div);
            }
        }
    }

    function showSummary() {
        document.getElementById('summarySection').style.display = 'block';
    }

    function toggleSummary() {
        const section = document.getElementById('summarySection');
        section.style.display = section.style.display === 'none' ? 'block' : 'none';
    }

    function clearAll() {
        summaryData = {};
        updateSummary();
        calculateGrandTotal();
        document.querySelectorAll('.status').forEach(el => {
            el.style.display = 'none';
            el.innerHTML = '';
        });
        document.getElementById('summarySection').style.display = 'none';
    }

    function copySummary() {
        const summaryText = Object.values(summaryData).flat().map(entry => 
            `${entry.product} (${entry.date}): ${entry.count}`
        ).join('\n');

        navigator.clipboard.writeText(summaryText)
            .then(() => alert('✅ Summary copied to clipboard!'))
            .catch(() => {
                // Fallback for older browsers
                const textArea = document.createElement('textarea');
                textArea.value = summaryText;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                alert('✅ Summary copied to clipboard!');
            });
    }

    function deleteEntry(key, index) {
        if (summaryData[key] && summaryData[key][index]) {
            summaryData[key].splice(index, 1);
            if (summaryData[key].length === 0) delete summaryData[key];
            updateSummary();
            calculateGrandTotal();
        }
    }

    // Initialize on load
    window.onload = function() {
        fetchHistory();
    };
</script>
</body>
</html>
