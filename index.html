<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker Audit Log - Fast Entry</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --success-light: #ecfdf5;
            --success-dark: #047857;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            padding: 30px 15px;
            min-height: 100vh;
            margin: 0;
            line-height: 1.5;
        }

        /* Layout Wrapper */
        .main-wrapper {
            display: flex;
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
            align-items: flex-start;
        }

        /* Left Side: Cloud Records */
        .sidebar {
            flex: 1;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            max-height: 90vh;
            overflow-y: auto;
            position: sticky;
            top: 20px;
        }

        /* Right Side: Original Audit Log */
        .main-content {
            flex: 1.8;
        }

        .audit-box {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }

        h1, h2 {
            text-align: center;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 5px;
            letter-spacing: -0.025em;
        }

        h1 { font-size: 1.8rem; }
        h2 { font-size: 1.3rem; margin-top: 0; }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        /* Table Styling */
        .cloud-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            font-size: 0.85rem;
        }

        .cloud-table th {
            background: #f8fafc;
            padding: 10px;
            text-align: left;
            border-bottom: 2px solid var(--border);
            color: var(--text-muted);
            text-transform: uppercase;
        }

        .cloud-table td {
            padding: 10px;
            border-bottom: 1px solid var(--border);
        }

        .refresh-btn {
            width: 100%;
            margin-bottom: 15px;
            background: #6366f1;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        /* ... (rest of your original component styles) ... */
        .product-section { margin-bottom: 12px; padding: 16px; border: 1px solid var(--border); border-radius: 12px; background: #f8fafc; transition: all 0.2s ease; }
        .product-section:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); background: #fff; }
        .product-line { font-size: 1rem; font-weight: 600; margin-bottom: 12px; color: #0f172a; }
        .input-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
        input[type="date"], input[type="number"] { background: #fff; color: var(--text-main); border: 1px solid var(--border); padding: 10px 12px; border-radius: 8px; font-family: inherit; font-size: 0.95rem; }
        input[type="number"] { width: 100px; font-weight: 600; }
        .enter-btn { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; align-self: flex-end; }
        .status { margin-top: 10px; padding: 8px 12px; font-size: 0.85rem; border-radius: 6px; display: none; font-weight: 500; }
        .status.sent { background: var(--success-light); color: var(--success-dark); display: flex; align-items: center; gap: 6px; }
        .grand-total { font-size: 1.4rem; margin: 30px 0 20px 0; background: #0f172a; color: #fff; padding: 20px; text-align: center; border-radius: 12px; font-weight: 700; }
        .summary-section { margin-top: 25px; padding: 20px; background: #f8fafc; border: 1px solid var(--border); border-radius: 12px; max-height: 400px; overflow-y: auto; }
        .summary-title { text-align: center; font-size: 1.2rem; font-weight: 700; color: #0f172a; margin-bottom: 15px; }
        .summary-product { margin-bottom: 12px; padding: 12px; background: #fff; border: 1px solid var(--border); border-radius: 8px; }
        .product-header { font-weight: 700; color: #0f172a; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .summary-item { display: flex; justify-content: space-between; padding: 4px 8px; margin: 2px 0; background: #f8fafc; border-radius: 4px; font-size: 0.9rem; color: var(--text-muted); }
        .product-total { font-weight: 700; color: var(--success-dark); background: var(--success-light); padding: 6px; border-radius: 6px; margin-top: 8px; font-size: 0.85rem; text-align: right; }
        .action-buttons { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 25px; }
        .btn { background: #fff; color: var(--text-main); border: 1px solid var(--border); padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; font-size: 0.9rem; }
        .btn-danger { color: var(--danger); }
        .btn-primary { background: var(--primary); color: white; }

        @media (max-width: 1000px) {
            .main-wrapper { flex-direction: column; }
            .sidebar { position: static; max-height: none; width: 100%; box-sizing: border-box; }
            .main-content { width: 100%; }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="sidebar">
        <h2>📊 Cloud Records</h2>
        <button class="refresh-btn" onclick="fetchCloudData()">🔄 Refresh from Sheets</button>
        <div id="cloudTableContainer">
            <p style="text-align:center; color:var(--text-muted);">Click refresh to load database...</p>
        </div>
    </div>

    <div class="main-content">
        <div class="audit-box">
            <h1>Sticker Audit Log</h1>
            <div class="subtitle">Enter counts, press Enter or click Add to log.</div>

            <div id="products-container"></div>

            <div class="grand-total" id="grandTotal">
                GRAND TOTAL: 0 STICKERS
            </div>

            <div class="summary-section" id="summarySection" style="display: none;">
                <div class="summary-title">📊 Live Summary</div>
                <div id="summaryList"></div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-danger" onclick="clearAll()">🗑️ Clear All</button>
                <button class="btn btn-primary" onclick="toggleSummary()">📋 Toggle Summary</button>
                <button class="btn btn-primary" onclick="copySummary()">📄 Copy Summary</button>
                <button class="btn btn-primary" onclick="toggleDetailedSummary()">📝 Edit All Entries</button>
                <button class="btn btn-success" id="saveBtn" onclick="saveToGoogleSheets()" style="background: #10b981; color: white; border-color: #10b981;">☁️ Save to Sheets</button>
            </div>
        </div>
    </div>
</div>

<div style="margin-top: 25px;">
  <div id="detailedSummaryContainer" style="display:none; margin-top:15px; padding-bottom: 50px;">
    <div class="summary-title" style="color: var(--text-main);">🛠️ Manage Entries</div>
    <div id="detailedSummary"></div>
  </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzMM60idR6QEYvznvh2ogYXDxSJ9552beS6rLFMNdhqRtqDh0zuOq4TwrHCJ8u5uKCFOA/exec";
    
    const productList = [
        "1 x SEAT COVER", "1 x MINI FLASHLIGHT", "1 x FULL FACE BALACLAVA",
        "1 x FLEXIBLE CLIP PHONE HOLDER", "2 x SHOE CLEANER", "2 x FLASHLIGHT",
        "2 x MINI FLASHLIGHT", "1 x PANTY STOCKINGS", "1 x MAGIC MESH", "2 x ANTI - PULGAS", "1 x MAGIC TOWEL"
    ];

    let summaryData = {}; 
    let summaryVisible = false;
    const today = new Date().toISOString().split('T')[0];

    // Generate Inputs
    const container = document.getElementById('products-container');
    productList.forEach((product, index) => {
        const id = index + 1;
        container.innerHTML += `
            <div class="product-section">
                <div class="product-line">${product}</div>
                <div class="input-row">
                    <div class="input-group">
                        <label>Date</label>
                        <input type="date" id="date${id}" value="${today}">
                    </div>
                    <div class="input-group">
                        <label>Count</label>
                        <input type="number" id="count${id}" placeholder="0" min="1" 
                               onkeydown="if(event.key==='Enter') enterItem(${id})">
                    </div>
                    <button class="enter-btn" onclick="enterItem(${id})">Add</button>
                </div>
                <div class="status" id="status${id}"></div>
            </div>
        `;
    });

    // FETCH RECORDS FROM GOOGLE SHEETS
    function fetchCloudData() {
        const tableContainer = document.getElementById('cloudTableContainer');
        tableContainer.innerHTML = '<p style="text-align:center;">⌛ Fetching data...</p>';

        fetch(WEB_APP_URL)
            .then(response => response.json())
            .then(data => {
                if (data.status === "success" && data.records) {
                    let html = '<table class="cloud-table"><thead><tr><th>Date</th><th>Product</th><th>Qty</th></tr></thead><tbody>';
                    data.records.forEach(row => {
                        html += `<tr>
                            <td>${row.date || 'N/A'}</td>
                            <td>${row.product || 'N/A'}</td>
                            <td>${row.count || '0'}</td>
                        </tr>`;
                    });
                    html += '</tbody></table>';
                    tableContainer.innerHTML = html;
                } else {
                    tableContainer.innerHTML = '<p style="text-align:center;color:var(--danger);">No records found in Sheet.</p>';
                }
            })
            .catch(error => {
                console.error("Fetch error:", error);
                tableContainer.innerHTML = '<p style="text-align:center;color:var(--danger);">❌ Error connecting to database.</p>';
            });
    }

    // Load data automatically on start
    window.onload = fetchCloudData;

    // --- Original Functions ---
    function enterItem(id) {
        const dateInput = document.getElementById(`date${id}`).value;
        const countInput = document.getElementById(`count${id}`).value;
        const count = parseInt(countInput) || 0;
        const productName = productList[id - 1];
        const statusEl = document.getElementById(`status${id}`);

        if (!dateInput) { alert('Please select a date first!'); return; }
        if (count <= 0) { alert('Please enter a count greater than 0!'); return; }

        if (!summaryData[`item${id}`]) { summaryData[`item${id}`] = []; }

        summaryData[`item${id}`].push({ product: productName, date: dateInput, count: count });
        const productTotal = summaryData[`item${id}`].reduce((sum, entry) => sum + entry.count, 0);
        
        statusEl.innerHTML = `<span>✅ Added ${count}</span> <span>| Total: ${productTotal}</span>`;
        statusEl.style.display = 'block';
        statusEl.className = 'status sent';
        document.getElementById(`count${id}`).value = '';

        calculateGrandTotal();
        updateSummary();
        showSummary(); 
    }

    function calculateGrandTotal() {
        let grandTotal = 0;
        Object.values(summaryData).forEach(entries => entries.forEach(entry => grandTotal += entry.count));
        document.getElementById('grandTotal').textContent = `GRAND TOTAL: ${grandTotal} STICKERS`;
    }

    function updateSummary() {
        const summaryList = document.getElementById('summaryList');
        let summaryHTML = '';
        Object.keys(summaryData).forEach(key => {
            const entries = summaryData[key];
            if (entries.length > 0) {
                const productName = entries[0].product;
                const productTotal = entries.reduce((sum, entry) => sum + entry.count, 0);
                summaryHTML += `<div class="summary-product"><div class="product-header"><span>${productName}</span><span>Total: ${productTotal}</span></div>`;
                entries.forEach(entry => { summaryHTML += `<div class="summary-item"><span>📅 ${entry.date}</span><span>${entry.count} stickers</span></div>`; });
                summaryHTML += `<div class="product-total">🏆 Current Total: ${productTotal} Stickers</div></div>`;
            }
        });
        summaryList.innerHTML = summaryHTML || '<div style="text-align:center;color:#64748b;padding:20px;">No entries yet.</div>';
    }

    function showSummary() { summaryVisible = true; document.getElementById('summarySection').style.display = 'block'; updateSummary(); }
    function toggleSummary() { summaryVisible = !summaryVisible; document.getElementById('summarySection').style.display = summaryVisible ? 'block' : 'none'; if (summaryVisible) updateSummary(); }

    function clearAll() {
        if (!confirm('Clear ALL entries?')) return;
        summaryData = {};
        for(let i = 1; i <= productList.length; i++) {
            document.getElementById(`count${i}`).value = '';
            document.getElementById(`status${i}`).style.display = 'none';
        }
        document.getElementById('grandTotal').textContent = 'GRAND TOTAL: 0 STICKERS';
        document.getElementById('summarySection').style.display = 'none';
        summaryVisible = false;
        if(document.getElementById('detailedSummaryContainer').style.display === 'block') populateDetailedSummary();
    }

    function saveToGoogleSheets() {
        if (Object.keys(summaryData).length === 0) { alert("⚠️ No data to save!"); return; }
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.innerText = "⏳ Saving...";
        saveBtn.disabled = true;

        fetch(WEB_APP_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            redirect: "follow",
            body: JSON.stringify(summaryData)
        })
        .then(response => response.json())
        .then(data => {
            if (data.result === "success" || data.status === "success") {
                alert("✅ Successfully saved!");
                clearAll();
                fetchCloudData(); // Auto refresh the table
            } else { alert("❌ Error: " + (data.error || "Unknown")); }
        })
        .catch(error => alert("❌ Connection failed."))
        .finally(() => { saveBtn.innerText = "☁️ Save to Sheets"; saveBtn.disabled = false; });
    }
</script>

</body>
</html>
