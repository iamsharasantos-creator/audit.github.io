<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticker Audit Log - Fast Entry</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #10b981;
            --success-light: #ecfdf5;
            --success-dark: #047857;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            padding: 30px 15px;
            min-height: 100vh;
            margin: 0;
            line-height: 1.5;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .audit-box {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 5px;
            letter-spacing: -0.025em;
        }

        .subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .product-section {
            margin-bottom: 12px;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: #f8fafc;
            transition: all 0.2s ease;
        }

        .product-section:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
            background: #fff;
        }

        .product-line {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: #0f172a;
        }

        .input-row {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        label {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
        }

        input[type="date"], input[type="number"] {
            background: #fff;
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 10px 12px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        input[type="date"] {
            min-width: 150px;
        }

        input[type="number"] {
            width: 100px;
            font-weight: 600;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .enter-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.95rem;
            align-self: flex-end;
            transition: background-color 0.2s;
        }

        .enter-btn:hover {
            background: var(--primary-hover);
        }

        .status {
            margin-top: 10px;
            padding: 8px 12px;
            font-size: 0.85rem;
            border-radius: 6px;
            display: none;
            font-weight: 500;
        }

        .status.sent {
            background: var(--success-light);
            color: var(--success-dark);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .grand-total {
            font-size: 1.4rem;
            margin: 30px 0 20px 0;
            background: #0f172a;
            color: #fff;
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            font-weight: 700;
            letter-spacing: 0.025em;
        }

        /* SUMMARY STYLES */
        .summary-section {
            margin-top: 25px;
            padding: 20px;
            background: #f8fafc;
            border: 1px solid var(--border);
            border-radius: 12px;
            max-height: 400px;
            overflow-y: auto;
        }

        .summary-title {
            text-align: center;
            font-size: 1.2rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 15px;
        }

        .summary-product {
            margin-bottom: 12px;
            padding: 12px;
            background: #fff;
            border: 1px solid var(--border);
            border-radius: 8px;
        }

        .product-header {
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 8px;
            margin: 2px 0;
            background: #f8fafc;
            border-radius: 4px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .product-total {
            font-weight: 700;
            color: var(--success-dark);
            background: var(--success-light);
            padding: 6px;
            border-radius: 6px;
            margin-top: 8px;
            font-size: 0.85rem;
            text-align: right;
        }

        /* ACTION BUTTONS */
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 25px;
        }

        .btn {
            background: #fff;
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .btn:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }

        .btn-danger {
            color: var(--danger);
        }

        .btn-danger:hover {
            background: #fef2f2;
            border-color: #fecaca;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
            border-color: var(--primary-hover);
        }

        @media print {
            body { background: white; color: black; padding: 0; }
            .audit-box { box-shadow: none; padding: 0; }
            .summary-section { max-height: none; }
            .btn, .enter-btn, .input-row, .subtitle { display: none !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="audit-box">
        <h1>Sticker Audit Log</h1>
        <div class="subtitle">Enter counts, press Enter or click Add to log.</div>

        <div id="historySection" style="margin-bottom: 25px; padding: 15px; background: #f1f5f9; border-radius: 12px; border: 1px solid var(--border);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <span style="font-weight: 700; font-size: 0.9rem; color: var(--text-main);">📋 RECENT ENTRIES (FROM SHEET)</span>
                <button class="btn" onclick="fetchHistory()" style="padding: 4px 10px; font-size: 0.75rem;">🔄 Refresh</button>
            </div>
            <div id="historyList" style="max-height: 150px; overflow-y: auto; font-size: 0.85rem;">
                <div style="text-align: center; color: var(--text-muted);">Click refresh to load history...</div>
            </div>
        </div>

        <div id="products-container"></div>

        <div class="grand-total" id="grandTotal">
            GRAND TOTAL: 0 STICKERS
        </div>

        <div class="summary-section" id="summarySection" style="display: none;">
            <div class="summary-title">📊 Live Summary (Unsaved)</div>
            <div id="summaryList"></div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-danger" onclick="clearAll()">🗑️ Clear All</button>
            <button class="btn btn-primary" onclick="toggleSummary()">📋 Toggle Summary</button>
            <button class="btn btn-primary" onclick="copySummary()">📄 Copy Summary</button>
            <button class="btn btn-success" id="saveBtn" onclick="saveToGoogleSheets()" style="background: #10b981; color: white; border-color: #10b981;">☁️ Save to Sheets</button>
        </div>
    </div>
</div>

<div style="margin-top: 25px;">
  <div id="detailedSummaryContainer" style="display:none; margin-top:15px; padding-bottom: 50px;">
    <div class="summary-title" style="color: var(--text-main);">🛠️ Manage Entries</div>
    <div id="detailedSummary"></div>
  </div>
</div>

<script>
    const productList = [
        "1 x SEAT COVER", "1 x MINI FLASHLIGHT", "1 x FULL FACE BALACLAVA",
        "1 x FLEXIBLE CLIP PHONE HOLDER", "2 x SHOE CLEANER", "2 x FLASHLIGHT",
        "2 x MINI FLASHLIGHT", "1 x PANTY STOCKINGS", "1 x MAGIC MESH", "2 x ANTI - PULGAS", "1 x MAGIC TOWEL"
    ];

    let summaryData = {}; 
    let summaryVisible = false;
    const today = new Date().toISOString().split('T')[0];
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzMM60idR6QEYvznvh2ogYXDxSJ9552beS6rLFMNdhqRtqDh0zuOq4TwrHCJ8u5uKCFOA/exec";

    // Build Inputs
    const container = document.getElementById('products-container');
    productList.forEach((product, index) => {
        const id = index + 1;
        container.innerHTML += `
            <div class="product-section" id="productSection${id}">
                <div class="product-line">${product}</div>
                <div class="input-row">
                    <div class="input-group">
                        <label>Date</label>
                        <input type="date" id="date${id}" value="${today}">
                    </div>
                    <div class="input-group">
                        <label>Count</label>
                        <input type="number" id="count${id}" placeholder="0" min="1" 
                               onkeydown="if(event.key==='Enter') enterItem(${id})">
                    </div>
                    <button class="enter-btn" onclick="enterItem(${id})">Add</button>
                </div>
                <div class="status" id="status${id}"></div>
            </div>
        `;
    });

    // --- FETCH HISTORY ---
    function fetchHistory() {
        const historyList = document.getElementById('historyList');
        historyList.innerHTML = '<div style="text-align:center;">⌛ Loading history...</div>';

        fetch(WEB_APP_URL)
        .then(response => response.json())
        .then(data => {
            if (data.status === "success") {
                if (data.records.length === 0) {
                    historyList.innerHTML = '<div style="text-align:center;">No records found in sheet.</div>';
                    return;
                }
                let html = '<table style="width:100%; border-collapse: collapse;">';
                data.records.slice(0, 10).forEach(rec => {
                    html += `<tr style="border-bottom: 1px solid #e2e8f0;">
                                <td style="padding: 4px 0; color: #64748b;">${rec.date.split('T')[0]}</td>
                                <td style="padding: 4px 0; font-weight:600;">${rec.product}</td>
                                <td style="padding: 4px 0; text-align:right;">${rec.count}</td>
                             </tr>`;
                });
                html += '</table>';
                historyList.innerHTML = html;
            }
        })
        .catch(err => {
            historyList.innerHTML = '<div style="text-align:center; color:red;">⚠️ Failed to load history</div>';
        });
    }

    function enterItem(id) {
        const dateInput = document.getElementById(`date${id}`).value;
        const countInput = document.getElementById(`count${id}`).value;
        const count = parseInt(countInput) || 0;
        const productName = productList[id - 1];
        const statusEl = document.getElementById(`status${id}`);

        if (!dateInput || count <= 0) return;

        if (!summaryData[`item${id}`]) { summaryData[`item${id}`] = []; }
        summaryData[`item${id}`].push({ product: productName, date: dateInput, count: count });

        const productTotal = summaryData[`item${id}`].reduce((sum, entry) => sum + entry.count, 0);
        statusEl.innerHTML = `<span>✅ Added ${count}</span> <span>| Total: ${productTotal}</span>`;
        statusEl.style.display = 'flex';
        statusEl.className = 'status sent';

        document.getElementById(`count${id}`).value = '';
        calculateGrandTotal();
        updateSummary();
        showSummary(); 
    }

    function saveToGoogleSheets() {
        if (Object.keys(summaryData).length === 0) {
            alert("⚠️ No data to save!");
            return;
        }

        const saveBtn = document.getElementById('saveBtn');
        saveBtn.innerText = "⏳ Saving...";
        saveBtn.disabled = true;

        fetch(WEB_APP_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            redirect: "follow",
            body: JSON.stringify(summaryData)
        })
        .then(response => response.json())
        .then(data => {
            if (data.result === "success" || data.status === "success") {
                alert("✅ Successfully saved to Google Sheets!");
                clearAll();
                fetchHistory();
            } else {
                alert("❌ Error: " + (data.error || "Unknown error"));
            }
        })
        .catch(error => {
            alert("❌ Failed to reach the server.");
        })
        .finally(() => {
            saveBtn.innerText = "☁️ Save to Sheets";
            saveBtn.disabled = false;
        });
    }

    // --- ADDITIONAL FUNCTIONS ---

function calculateGrandTotal() {
    let totalCount = 0;
    Object.values(summaryData).forEach(entries => {
        entries.forEach(entry => {
            totalCount += entry.count;
        });
    });
    document.getElementById('grandTotal').innerText = `GRAND TOTAL: ${totalCount} STICKERS`;
}

function updateSummary() {
    const summaryList = document.getElementById('summaryList');
    summaryList.innerHTML = '';
    for (const key in summaryData) {
        summaryData[key].forEach((entry, index) => {
            const div = document.createElement('div');
            div.className = 'summary-item';
            div.innerHTML = `
                ${entry.product} - ${entry.date} - Count: ${entry.count}
                <button style="border:none; background:none; color:${getComputedStyle(document.documentElement).getPropertyValue('--danger')}; cursor:pointer;" onclick="deleteEntry('${key}', ${index})">🗑️</button>
            `;
            summaryList.appendChild(div);
        });
    }
}

function showSummary() {
    document.getElementById('summarySection').style.display = 'block';
}

function toggleSummary() {
    const section = document.getElementById('summarySection');
    section.style.display = section.style.display === 'none' ? 'block' : 'none';
}

function clearAll() {
    summaryData = {};
    updateSummary();
    calculateGrandTotal();
    document.querySelectorAll('.status').forEach(el => {
        el.style.display = 'none';
        el.innerHTML = '';
    });
}

function copySummary() {
    const summaryText = Object.values(summaryData).flat().map(entry => 
        `${entry.product} (${entry.date}): ${entry.count}`
    ).join('\n');

    navigator.clipboard.writeText(summaryText)
        .then(() => alert('Copied summary to clipboard!'))
        .catch(() => alert('Failed to copy.'));
}

function toggleDetailedSummary() {
    const container = document.getElementById('detailedSummaryContainer');
    container.style.display = container.style.display === 'none' ? 'block' : 'none';
}

function updateEntry(key, index, newData) {
    if (summaryData[key] && summaryData[key][index]) {
        summaryData[key][index] = { ...summaryData[key][index], ...newData };
        updateSummary();
        calculateGrandTotal();
    }
}

function deleteEntry(key, index) {
    if (summaryData[key] && summaryData[key][index]) {
        summaryData[key].splice(index, 1);
        if (summaryData[key].length === 0) delete summaryData[key];
        updateSummary();
        calculateGrandTotal();
    }
}

// Initialize history on load
window.onload = fetchHistory;
</script>
</body>
</html>
